<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/9vi2RLnW1.mp4","M4L4M S3P1 Y4NG M3NGVB4H SV45N4"],
  ["https://cdn2.videy.co/TE16CrfO1.mp4","D14M K4M4R D3NG4N R454 Y4NG T4K B1S4 D1J3L45K4N"],
  ["https://cdn2.videy.co/OCkqhSyN1.mp4","P4ND4NG4N S1N94T Y4NG M3MBV4T J4NTVNG B3R4D3G"],
  ["https://cdn2.videy.co/pbTbSBJo1.mp4","K3D3K4T4N H4LVS D1 T3N94H K3H3N1NG4N"],
  ["https://cdn2.videy.co/eRhzNQWU1.mp4","SV45N4 P4NJ4NG Y4NG S3M4K1N M3ND4L4M"],
  ["https://cdn2.videy.co/YLLGoZd31.mp4","R454 T4K T3RVC4P D1 B4L1K D14M"],
  ["https://cdn2.videy.co/i2XNSItW1.mp4","M0M3N K3C1L Y4NG M3NGVB4H S3MVSNY4"],
  ["https://cdn2.videy.co/ViPO9Z6m1.mp4","G3R4K P3L4N D4N P1K1R4N K4CV"],
  ["https://cdn2.videy.co/fD00Yqg61.mp4","K3H4N94T4N Y4NG T1B4 T1B4 T3R454"],
  ["https://cdn2.videy.co/LJi4qLx61.mp4","D3T4K J4NTVNG D4N N4P45 Y4NG T1D4K S3J4L4N"],
  ["https://cdn2.videy.co/J3DpmoRI1.mp4","SV45N4 D3K4T T4NP4 B4NY4K K4T4"],
  ["https://cdn2.videy.co/Y5Nsc7331.mp4","R454 4N3H Y4NG M3NV54P P3L4N"],
  ["https://cdn2.videy.co/tBCGxDNS1.mp4","M4L4M 1NV M3NJ4D1 K3N4NG4N"],
  ["https://cdn2.videy.co/cM9NLRrA1.mp4","H3N1NG Y4NG M3MBV4T S3MVSNY4 B3RVB4H"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
